<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What does your life actually need?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0d0c0a;
    --paper: #f5f0e8;
    --gold: #b8860b;
    --muted: #7a7268;
    --rule: #ddd5c8;
  }

  html, body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Libre Baskerville', serif;
  }

  section {
    min-height: 100vh;
    padding: clamp(48px, 8vw, 120px) clamp(24px, 8vw, 120px);
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── COVER ── */
  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 48px;
  }
  .eyebrow::before {
    content: '';
    width: 28px; height: 1px;
    background: var(--gold);
    flex-shrink: 0;
  }

  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 900;
    line-height: 0.92;
    margin-bottom: 48px;
  }
  .cover-title em { font-style: italic; color: var(--gold); }

  .cover-sub {
    font-style: italic;
    font-size: clamp(16px, 2vw, 21px);
    color: var(--muted);
    line-height: 1.65;
    border-left: 2px solid var(--gold);
    padding-left: 28px;
    margin-bottom: 56px;
    max-width: 44ch;
  }

  .meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .btn-primary {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    padding: 18px 44px;
    cursor: pointer;
    transition: opacity 0.2s;
    display: inline-block;
    text-decoration: none;
  }
  .btn-primary:hover { opacity: 0.72; }

  /* ── QUIZ ── */
  .progress-bar { height: 1px; background: var(--rule); margin-bottom: 10px; }
  .progress-fill { height: 1px; background: var(--gold); transition: width 0.4s ease; }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 56px;
  }

  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 4vw, 44px);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 48px;
    max-width: 22ch;
  }

  .options { display: flex; flex-direction: column; gap: 14px; margin-bottom: 48px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 22px 28px;
    border: 1px solid var(--rule);
    cursor: pointer;
    background: transparent;
    text-align: left;
    width: 100%;
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover { border-color: var(--gold); background: rgba(184,134,11,0.04); }
  .option.sel { border-color: var(--ink); border-width: 2px; }

  .opt-mark {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 3px;
    flex-shrink: 0;
    width: 18px;
  }
  .option.sel .opt-mark { color: var(--ink); }

  .opt-text {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(15px, 1.8vw, 18px);
    color: var(--ink);
    line-height: 1.5;
  }

  .nav { display: flex; align-items: center; gap: 24px; }

  .btn-next {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    padding: 16px 40px;
    cursor: pointer;
    opacity: 0.25;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .btn-next.rdy { opacity: 1; pointer-events: all; }
  .btn-next.rdy:hover { opacity: 0.72; }

  .btn-back {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .btn-back:hover { color: var(--ink); }

  /* ── LOADING ── */
  #loading {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 32px;
  }
  .loading-rule {
    width: 1px; height: 80px;
    background: linear-gradient(180deg, transparent, var(--gold), transparent);
    animation: grow 2s ease-in-out infinite;
  }
  @keyframes grow {
    0%, 100% { transform: scaleY(0.4); opacity: 0.3; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  .loading-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(20px, 3vw, 32px);
    color: var(--muted);
  }

  /* ── RESULT ── */
  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 40px;
  }
  .result-label::before {
    content: '';
    width: 28px; height: 1px;
    background: var(--gold);
  }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 900;
    line-height: 0.95;
    margin-bottom: 64px;
  }

  .r-section {
    margin-bottom: 56px;
    padding-bottom: 56px;
    border-bottom: 1px solid var(--rule);
  }
  .r-section:last-of-type { border-bottom: none; }

  .r-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .r-priorities {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 700;
    line-height: 1.3;
  }
  .r-priorities em { font-style: italic; color: var(--gold); }

  .r-routes { display: flex; flex-wrap: wrap; gap: 12px; }
  .r-route-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 20px;
    border: 1px solid var(--ink);
    color: var(--ink);
  }

  .r-tradeoffs {
    font-family: 'Libre Baskerville', serif;
    font-style: italic;
    font-size: clamp(16px, 1.8vw, 20px);
    line-height: 1.7;
    color: var(--muted);
  }

  .r-question {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 2.8vw, 36px);
    font-weight: 700;
    font-style: italic;
    line-height: 1.3;
    border-left: 3px solid var(--gold);
    padding-left: 32px;
  }

  .btn-restart {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--rule);
    padding: 14px 32px;
    cursor: pointer;
    margin-top: 64px;
    transition: border-color 0.2s, color 0.2s;
    display: inline-block;
  }
  .btn-restart:hover { border-color: var(--ink); color: var(--ink); }

  .fade { animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none; }
</style>
</head>
<body>

<!-- COVER -->
<section id="cover" class="fade">
  <div class="eyebrow">Immigration Motivation Assessment</div>
  <h1 class="cover-title">
    What does your life<br>
    <em>actually</em><br>
    need?
  </h1>
  <p class="cover-sub">
    This isn't about which visa you qualify for. It's about which path fits the life you're trying to build.
  </p>
  <div class="meta">6 questions &nbsp;·&nbsp; 3 minutes &nbsp;·&nbsp; free</div>
  <button class="btn-primary" onclick="startQuiz()">Begin →</button>
</section>

<!-- QUIZ -->
<section id="quiz" class="hidden">
  <div class="progress-bar">
    <div class="progress-fill" id="pFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="pLabel">Question 1 of 6</div>
  <div id="qBlock"></div>
</section>

<!-- LOADING -->
<div id="loading" style="display:none; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; gap:32px;">
  <div class="loading-rule"></div>
  <div class="loading-text">Reading your answers…</div>
</div>

<!-- RESULT -->
<section id="result" class="hidden">
  <div class="result-label">Your profile</div>
  <h2 class="result-title">Here's what<br>your answers reveal.</h2>
  <div id="resultBody"></div>
  <button class="btn-restart" onclick="restart()">Start again</button>
</section>

<script>
const Qs = [
  {
    text: "Which statement sounds most like you?",
    opts: [
      "I'm comfortable building my career inside one company",
      "I want flexibility to change employers freely",
      "I want multiple income streams",
      "I eventually want to freelance or consult",
      "I want to build my own business"
    ]
  },
  {
    text: "Which trade-off feels easier to accept?",
    opts: [
      "My immigration status depending on my employer",
      "Being professionally tied to one field long-term",
      "Pressure to grow a business and hit milestones"
    ]
  },
  {
    text: "Imagine your life in 3 years. What sounds closest?",
    opts: [
      "Stable employment with clear progression at one company",
      "A portfolio career across different projects and clients",
      "Running my own business",
      "Flexibility to pivot whenever opportunities appear"
    ]
  },
  {
    text: "What would stress you more?",
    opts: [
      "Losing my job and my immigration status at the same time",
      "Being unable to pivot professionally or change direction",
      "Business uncertainty and inconsistent income",
      "Feeling tied to one professional field"
    ]
  },
  {
    text: "How would you feel if your settlement timeline doubled because the rules changed?",
    opts: [
      "It would seriously affect my plans — speed matters to me",
      "Frustrating, but I'd adapt",
      "Settlement speed isn't my main priority"
    ]
  },
  {
    text: "How do you think about financial risk?",
    opts: [
      "I need a predictable salary — uncertainty affects me significantly",
      "I can handle some uncertainty but need a baseline income I can rely on",
      "I'm comfortable with variable income if I have control over it",
      "I'd rather take the financial risk than depend on someone else"
    ]
  }
];

const marks = ['A','B','C','D','E'];
let cur = 0;
const ans = {};

function startQuiz() {
  show('quiz'); hide('cover');
  renderQ(0);
}

function renderQ(i) {
  cur = i;
  document.getElementById('pFill').style.width = (i/6*100) + '%';
  document.getElementById('pLabel').textContent = 'Question ' + (i+1) + ' of 6';

  const q = Qs[i];
  const isLast = i === 5;
  const saved = ans['q'+(i+1)];

  let html = '<div class="q-num">Question 0'+(i+1)+'</div>';
  html += '<div class="q-text">'+q.text+'</div>';
  html += '<div class="options">';
  q.opts.forEach((o,j) => {
    const s = saved === o ? ' sel' : '';
    html += '<button class="option'+s+'" onclick="pick(this,'+i+')">';
    html += '<span class="opt-mark">'+marks[j]+'</span>';
    html += '<span class="opt-text">'+o+'</span>';
    html += '</button>';
  });
  html += '</div><div class="nav">';
  html += '<button class="btn-next'+(saved?' rdy':'')+'" id="btnNext" onclick="'+(isLast?'submit()':'next()')+'">'+( isLast?'See my profile →':'Next →')+'</button>';
  if (i > 0) html += '<button class="btn-back" onclick="back()">← Back</button>';
  html += '</div>';

  const b = document.getElementById('qBlock');
  b.innerHTML = html;
  b.className = 'fade';
}

function pick(btn, i) {
  btn.closest('.options').querySelectorAll('.option').forEach(o => o.classList.remove('sel'));
  btn.classList.add('sel');
  ans['q'+(i+1)] = btn.querySelector('.opt-text').textContent.trim();
  const n = document.getElementById('btnNext');
  if (n) n.classList.add('rdy');
}

function next() { renderQ(cur+1); }
function back() { renderQ(cur-1); }

async function submit() {
  hide('quiz');
  document.getElementById('loading').style.display = 'flex';

  try {
    const res = await fetch('/api/assess', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: ans })
    });
    const p = await res.json();
    if (p.error) throw new Error(p.error);

    const priWords = p.priorities.split(',').map(w => w.trim());
    const priHtml = priWords.map((w,i) =>
      i < priWords.length-1 ? '<em>'+w+'</em>,' : 'and <em>'+w+'.</em>'
    ).join('<br>');

    const routesHtml = p.routes.map(r => '<div class="r-route-tag">'+r+'</div>').join('');

   document.getElementById('resultBody').innerHTML =
      '<div class="r-section"><div class="r-label">You prioritise</div><div class="r-priorities">'+priHtml+'</div></div>'+
      '<div class="r-section"><div class="r-label">The trade-offs you seem less comfortable with</div><div class="r-tradeoffs">'+p.tradeoffs+'</div></div>'+
      '<div class="r-section"><div class="r-label">Routes worth exploring</div><div class="r-routes">'+routesHtml+'</div></div>'+
      '<div class="r-section"><div class="r-label">The question to sit with</div><div class="r-question">\u201c'+p.question+'\u201d</div></div>';

  } catch(e) {
    document.getElementById('resultBody').innerHTML =
      '<p style="font-style:italic;color:#7a7268;">Something went wrong. Please refresh and try again.</p>';
  }

  document.getElementById('loading').style.display = 'none';
  show('result');
  window.scrollTo(0,0);
}

function restart() {
  Object.keys(ans).forEach(k => delete ans[k]);
  hide('result'); show('cover');
  window.scrollTo(0,0);
}

function show(id) {
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.classList.add('fade');
}
function hide(id) {
  document.getElementById(id).classList.add('hidden');
}
</script>
</body>
</html>
